name: Build Windows Exe

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Windows exe
        run: npx pkg . --target node18-win-x64 --output dist/kick-save.exe --compress GZip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kick-save-windows
          path: dist/kick-save.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/kick-save.exe
          generate_release_notes: true

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Linux binary
        run: npx pkg . --target node18-linux-x64 --output dist/kick-save-linux --compress GZip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kick-save-linux
          path: dist/kick-save-linux

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/kick-save-linux
